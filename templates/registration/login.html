{% extends 'tienda/base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold">Iniciar Sesión</h3>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-success text-center py-2 small">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 mt-2">Ingresar</button>
                </form>
                <hr>
                <p class="text-center small mb-0">¿No tenés cuenta? <a href="{% url 'registrar' %}">Registrate acá</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
